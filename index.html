<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1d7a5f" />
<title>Family Find-It Road Trip</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <span class="logo">🚗</span>
    <div class="header-text">
      <h1>Family Find-It</h1>
      <p class="subtitle">Spot it together, every stop and every mile</p>
    </div>
  </div>
  <div class="total-finds">
    <span class="total-finds-number" id="totalFindsNumber">0</span>
    <span class="total-finds-label">found together</span>
  </div>
</header>

<main>
  <div class="trip-controls">
    <button type="button" id="driveBtn" class="trip-btn">🚗 We're Driving</button>
    <button type="button" id="stopBtn" class="trip-btn">🅿️ We Stopped</button>
  </div>

  <section class="progress-card">
    <div class="progress-info">
      <span id="progressLabel">0 of 0 found</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar-track">
      <div id="progressBarFill" class="progress-bar-fill"></div>
    </div>
  </section>

  <section class="missions-section">
    <div class="missions-header">
      <h2 id="currentStopName">This Stop</h2>
      <div class="header-actions">
        <button type="button" id="rerollBtn" class="rename-btn" aria-label="Get new activities">🔀</button>
      </div>
    </div>
    <div id="celebration" class="celebration" hidden>
      <div class="celebration-text">🎉 You found it all, team! 🎉</div>
      <button type="button" id="celebrationRerollBtn" class="celebration-btn">Find something new</button>
    </div>
    <ul id="missionsList" class="missions-list"></ul>
    <p id="emptyState" class="empty-state" hidden>Nothing to find yet. Add one below to get the game started!</p>
  </section>
</main>

<div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>

<form id="addMissionForm" class="add-mission-bar">
  <input
    id="missionInput"
    type="text"
    placeholder="Add something to find, e.g. a Tesla"
    autocomplete="off"
    maxlength="120"
    inputmode="text"
  />
  <button type="submit" class="add-btn" aria-label="Add mission">Add</button>
</form>

<script src="js/app.js"></script>
</body>
</html>
